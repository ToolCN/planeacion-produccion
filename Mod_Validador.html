function val_formatNum(n){var num=Number(String(n).replace(/,/g,''));if(isNaN(num))return '0';return num.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}

function val_switchTab(i){
  val_tabActual=i;
  document.querySelectorAll('.val-tab-link,.val-tab-content').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.val-tab-link')[i].classList.add('active');
  document.getElementById('val-tab'+i).classList.add('active');
  document.getElementById('val-toolbarAuditoria').style.visibility=(i===0?'visible':'hidden');
  var vf=document.getElementById('val-ventasFilters');if(vf)vf.style.display=(i===1?'flex':'none');
  var be=document.getElementById('val-btnExportar');if(be)be.style.display=(i===1?'inline-block':'none');
  val_actualizarBadgesPestañas(); val_updateFab();
}

function val_cargarDatos(){
  showLoader('Sincronizando Validador...');
  google.script.run
    .withSuccessHandler(function(res){val_dataOrig=JSON.parse(res);val_inicializarFiltrosMaestros();val_renderAuditoria();hideLoader();})
    .withFailureHandler(function(e){hideLoader();Swal.fire('Error',''+e,'error');})
    .obtenerDatosCompletosValidador();
}

function val_actualizarBadgesPestañas(){
  var b0=document.getElementById('val-badgeTab0');if(b0){var n=val_cambiosAuditoria.size;b0.innerText=n;b0.style.display=n>0?'flex':'none';}
  var b1=document.getElementById('val-badgeTab1');if(b1){var n=val_cambiosVentas.size;b1.innerText=n;b1.style.display=n>0?'flex':'none';}
}

function val_inicializarFiltrosMaestros(){
  if(!val_dataOrig.familias)return;
  val_opcionesFiltros.family=val_dataOrig.familias.filter(function(f){return f;});
  val_opcionesFiltros.diametro=val_dataOrig.diametros.filter(function(d){return d;});
  val_opcionesFiltros.longitud=val_dataOrig.longitudes.filter(function(l){return l;});
  val_filtrosMaestrosActivos={family:[],diametro:[],longitud:[]};
  val_actualizarBadgesFiltros();
}

function val_abrirModalFiltro(tipo){
  val_filtroModalActual=tipo;
  var tit={'family':'FAMILY','diametro':'DIÁMETRO','longitud':'LONGITUD'};
  document.getElementById('val-tituloModalFiltro').innerText='Filtrar por '+tit[tipo];
  var opciones=val_opcionesFiltros[tipo],seleccionados=val_filtrosMaestrosActivos[tipo];
  document.getElementById('val-listadoFiltros').innerHTML=opciones.map(function(opc){
    var chk=seleccionados.indexOf(opc)>-1?'checked':'';
    return '<div class="val-filtro-item"><label><input type="checkbox" value="'+opc+'" '+chk+' onchange="val_toggleFiltroOpcion(\''+tipo+'\',\''+opc+'\',this.checked)"> '+opc+'</label></div>';
  }).join('');
  document.getElementById('val-searchFiltro').value='';
  document.getElementById('val-modalFiltros').style.display='flex';
}
function val_toggleFiltroOpcion(tipo,valor,checked){
  if(checked){if(val_filtrosMaestrosActivos[tipo].indexOf(valor)<0)val_filtrosMaestrosActivos[tipo].push(valor);}
  else{val_filtrosMaestrosActivos[tipo]=val_filtrosMaestrosActivos[tipo].filter(function(v){return v!==valor;});}
}
function val_seleccionarTodosFiltro(sel){
  var tipo=val_filtroModalActual;
  document.querySelectorAll('#val-listadoFiltros input[type="checkbox"]').forEach(function(cb){
    if(cb.parentElement.parentElement.style.display!=='none'){cb.checked=sel;val_toggleFiltroOpcion(tipo,cb.value,sel);}
  });
}
function val_cerrarModalFiltros(){document.getElementById('val-modalFiltros').style.display='none';val_actualizarBadgesFiltros();val_aplicarFiltrosMaestros();}
function val_filtrarEnModal(texto){
  texto=texto.toLowerCase();
  document.querySelectorAll('.val-filtro-item').forEach(function(item){item.style.display=item.textContent.toLowerCase().includes(texto)?'block':'none';});
}
function val_actualizarBadgesFiltros(){
  [{tipo:'family',id:'val-badgesFamily'},{tipo:'diametro',id:'val-badgesDiametro'},{tipo:'longitud',id:'val-badgesLongitud'}].forEach(function(cfg){
    var c=document.getElementById(cfg.id);if(!c)return;
    var sel=val_filtrosMaestrosActivos[cfg.tipo];
    if(!sel.length||sel.length===val_opcionesFiltros[cfg.tipo].length){c.innerHTML='<span class="val-badge">Todos</span>';}
    else if(sel.length<=4){c.innerHTML=sel.map(function(s){return '<span class="val-badge">'+s+'</span>';}).join('');}
    else{c.innerHTML=sel.slice(0,4).map(function(s){return '<span class="val-badge">'+s+'</span>';}).join('')+'<span class="val-badge">+'+( sel.length-4)+'</span>';}
  });
}

function val_renderAuditoria(){
  var container=document.getElementById('val-contAuditoria');if(!container)return;
  if(!val_dataOrig||val_dataOrig.error){container.innerHTML='<div style="padding:14px;color:red;font-weight:bold">⚠️ Error: '+(val_dataOrig?val_dataOrig.error:'Sin datos')+'</div>';return;}
  if(!val_dataOrig.candidatos||!Array.isArray(val_dataOrig.candidatos)){container.innerHTML='<p style="text-align:center;padding:20px">No hay pedidos candidatos.</p>';return;}
  var html='<table class="val-table"><thead><tr><th style="width:36px">#</th><th style="width:44px">Cerrar</th><th style="width:28%">PEDIDO / STOCK</th><th style="width:23%">A FABRICAR</th><th>ÓRDENES Y PROCESOS</th></tr></thead><tbody>';
  val_dataOrig.candidatos.forEach(function(keyPed){
    var p=val_dataOrig.pedidos[keyPed];if(!p)return;
    var avance=val_calcularAvancePedido(keyPed);
    var rowClass=avance>=80?'val-row-80':(avance>=100?'val-row-excedido':'');
    var aFabricar=p.inv&&p.inv.max>0?(p.inv.max-p.inv.ext):0;
    var mostrarFab=p.inv&&p.inv.max>0&&p.nombre&&p.nombre.includes('QSQ');
    var back2=0;
    for(var ko in val_dataOrig.ordenes){
      var go=val_dataOrig.ordenes[ko];
      if(go.keyPed!==keyPed||go.estOrd==='CANCELADO')continue;
      var minSec=999,firstProc=null;
      go.rows.forEach(function(r){if(r.sec<minSec){minSec=r.sec;firstProc=r;}});
      if(firstProc)back2+=Math.max(0,firstProc.sol-firstProc.prod);
    }
    html+='<tr id="rowAud-'+keyPed+'" class="'+rowClass+'" data-search="'+keyPed+' '+(p.cod||'')+' '+(p.nombre||'')+'" data-family="'+(p.family||'')+'" data-diametro="'+(p.diametro||'')+'" data-longitud="'+(p.longitud||'')+'">';
    html+='<td class="td-numero" style="text-align:center;font-size:12px"></td>';
    html+='<td style="text-align:center"><input type="checkbox" class="chk-cierre" data-keyped="'+keyPed+'" onchange="val_markCierre(\''+keyPed+'\',this.checked)" style="transform:scale(1.5)"><br><span style="font-size:10px;color:'+(avance>=80?'#2e7d32':'#999')+'">'+Math.round(avance)+'%</span><br>';
    html+='<button class="val-btn-status" style="background:#f44336;font-size:10px;margin-top:3px" onclick="val_cancelarPedido(\''+keyPed+'\')">✗ Canc.</button></td>';
    html+='<td><b>'+(p.nombre||keyPed)+'</b> (<span id="txt-est-ped-'+keyPed+'">'+(p.est||'')+'</span>)<br>';
    html+='<div style="font-size:11px;color:#546e7a;margin-bottom:3px;">'+(p.cod||'')
      +' &nbsp;<span style="color:#78909c">'
      +[p.tipo, p.diametro?(p.diametro+'×'+p.longitud):'', p.cuerpo, p.cuerda, p.acero?('<'+p.acero+'>'):'' ]
        .filter(Boolean).join(' ')
      +'</span></div>';
    if(p.inv)html+='<div class="val-stock-info">Stock: <b>'+val_formatNum(p.inv.ext)+'</b> | MIN: '+val_formatNum(p.inv.min)+' | MAX: '+val_formatNum(p.inv.max)+'</div>';
    html+='Meta: <input type="text" class="val-inp-edit" id="inp-ped-'+keyPed+'" value="'+val_formatNum(p.cant)+'" onchange="val_regChangePedFormatted(\''+keyPed+'\',this,\'rowAud-'+keyPed+'\')">';
    html+='<button id="undo-ped-'+keyPed+'" class="val-btn-undo" onclick="val_undoPedido(\''+keyPed+'\')">↩</button>';
    html+='<div style="margin-top:3px;font-size:11px;color:#555">Back Alpha: <b style="color:#1565c0">'+val_formatNum(p.inv&&p.inv.back?p.inv.back:0)+'</b> | Back Planta: <b style="color:#880e4f">'+val_formatNum(Math.round(back2))+'</b></div></td>';
    html+='<td>'+(mostrarFab?val_renderFabricarBox(keyPed,aFabricar):'<span style="color:#999">N/A</span>')+'</td>';
    html+='<td style="padding:0">'+val_renderTableProcesos(keyPed)+'</td></tr>';
  });
  container.innerHTML=html+'</tbody></table>';
  val_renumerarFilas('contAuditoria');
}

function val_calcularAvancePedido(keyPed){
  var p=val_dataOrig.pedidos[keyPed];if(!p||p.cant===0)return 0;
  var maxProd=0;
  for(var k in val_dataOrig.ordenes){
    var g=val_dataOrig.ordenes[k];if(g.keyPed!==keyPed)continue;
    var lp=g.lastProc;if(!lp)continue;
    var divisor=1;
    if(lp.uni&&(lp.uni.includes('PZA')||lp.uni.includes('CTO'))){
      var longNum=(lp.tipo&&lp.tipo.includes('VARILLA'))?(parseFloat((lp.long.match(/[\d.]+/)||[1])[0])||1):1;
      divisor=lp.peso*longNum;
    }
    var pr=lp.prod/(divisor||1);if(pr>maxProd)maxProd=pr;
  }
  return(maxProd/p.cant)*100;
}

function val_renderFabricarBox(keyPed,aFabricar){
  var p=val_dataOrig.pedidos[keyPed];
  var ordenesRel=[];
  for(var k in val_dataOrig.ordenes){var g=val_dataOrig.ordenes[k];if(g.keyPed===keyPed)ordenesRel.push({key:k,data:g});}
  var otras=val_buscarOtrasOrdenes(p.cod,keyPed);
  ordenesRel=ordenesRel.concat(otras.map(function(o){return{key:o.ordKey,data:{keyPed:o.keyPed,rows:[{sol:o.sol,prod:o.prod}]},esDiferente:true,pedNombre:o.pedNombre};}));
  var html='<div class="val-fab-max-box"><b>A Fabricar:</b> <input type="text" class="val-inp-fab" id="inp-fab-'+keyPed+'" value="'+val_formatNum(aFabricar)+'" onchange="val_actualizarFabricar(\''+keyPed+'\',this.value)">';
  html+='<button class="val-btn-bomba" onclick="val_aplicarFabricar(\''+keyPed+'\')" title="Aplicar">💣</button>';
  html+='<button id="undo-bomba-'+keyPed+'" class="val-btn-undo" onclick="val_undoBomba(\''+keyPed+'\')">↩</button>';
  html+='<div id="preview-'+keyPed+'" class="val-preview-cambio" style="display:none"></div>';
  html+='<div style="margin-top:8px;font-size:11px;color:#666"><b>Selecciona orden:</b></div>';
  ordenesRel.forEach(function(item,idx){
    var lbl=item.esDiferente?item.key+' (Ped: '+item.pedNombre+')':item.key;
    html+='<div class="val-orden-item"><input type="radio" name="ord-'+keyPed+'" value="'+item.key+'" '+(idx===0?'checked':'')+'><span>'+lbl+' Sol:'+val_formatNum(item.data.rows[0].sol)+' Prod:'+val_formatNum(item.data.rows[0].prod)+'</span></div>';
  });
  html+='</div>';
  if(otras.length>0){html+='<div class="val-otras-ordenes"><b>Otras órdenes mismo código:</b><br>'+otras.map(function(o){return 'Ped: '+o.pedNombre+' | Ord: '+o.ordKey+' | Sol: '+val_formatNum(o.sol)+' | Prod: '+val_formatNum(o.prod);}).join('<br>')+'</div>';}
  return html;
}

function val_actualizarFabricar(keyPed,val){
  var inp=document.getElementById('inp-fab-'+keyPed);if(inp)inp.value=val_formatNum(val);
  val_mostrarPreviewBomba(keyPed,Number(val.replace(/,/g,'')));
}
function val_mostrarPreviewBomba(keyPed,fabVal){
  var radioSel=document.querySelector('input[name="ord-'+keyPed+'"]:checked');if(!radioSel)return;
  var orden=val_dataOrig.ordenes[radioSel.value];if(!orden)return;
  var preview=document.getElementById('preview-'+keyPed);if(!preview)return;
  var html='<b>Cambios:</b><br>• Orden '+radioSel.value+': '+val_formatNum(orden.rows[0].cantOrd)+' → <b>'+val_formatNum(fabVal)+'</b><br>';
  orden.rows.forEach(function(r){html+='• Proc '+r.proc+': Sol '+val_formatNum(r.sol)+' → <b>'+val_formatNum(val_calcularSol(fabVal,r))+'</b><br>';});

function val_buscarOtrasOrdenes(codigo,keyPedActual){
  var otras=[];
  for(var k in val_dataOrig.ordenes){
    var g=val_dataOrig.ordenes[k];if(g.keyPed===keyPedActual)continue;
    var ped=val_dataOrig.pedidos[g.keyPed];
    if(!ped||ped.cod!==codigo)continue;
    if(ped.est&&ped.est.match(/TERMINADO|CANCELADO|CERRADO/))continue;
    if(g.rows.length>0)otras.push({keyPed:g.keyPed,pedNombre:ped.nombre,ordKey:k,sol:g.rows[0].sol,prod:g.rows[0].prod});
  }
  return otras;
}

function val_regStateProc(ordKey,procIdx,est,rowId){

  var proc=g.rows.find(function(r){return r.idx===procIdx;});if(!proc)return;

}
function val_regChangeOrdFormatted(key,input,rowId){var v=input.value.replace(/,/g,'');input.value=val_formatNum(v);val_regChangeOrd(key,v,rowId);}
function val_regChangeOrd(key,val,rowId){
  var g=val_dataOrig.ordenes[key];if(!g)return;
  var esAud=!rowId||rowId.includes('rowAud-');var cambios=esAud?val_cambiosAuditoria:val_cambiosVentas;
  if(!val_valoresOriginalesOrdenes.has(key)){val_valoresOriginalesOrdenes.set(key,{cantOrd:g.rows[0].cantOrd,procesos:g.rows.map(function(r){return{idx:r.idx,sol:r.sol};})});}
  var procs=g.rows.map(function(r){var nSol=val_calcularSol(Number(val),r);var t=document.getElementById('sol-txt-'+key+'-'+r.idx);if(t){t.innerText=val_formatNum(nSol);t.classList.add('val-modified-text');}return{idx:r.idx,nuevoSol:nSol,vAnteriorSol:r.sol};});
  cambios.set('ORD_C_'+key,{tipo:'ORDEN',key:key,vAntCant:g.rows[0].cantOrd,nuevaCant:Number(val),procesos:procs});
  if(rowId){var r=document.getElementById(rowId);if(r)r.classList.add('val-row-highlight');}
  var ub=document.getElementById('undo-ord-'+key)||document.getElementById('undo-ord-s-'+key);if(ub)ub.style.display='inline-block';

function val_undoOrden(key,rowId){

  cambios.delete('ORD_C_'+key);
  var inpO=document.getElementById('inp-ord-'+key)||document.getElementById('inp-ord-s-'+key);if(inpO)inpO.value=val_formatNum(vo.cantOrd);
  vo.procesos.forEach(function(proc){var t=document.getElementById('sol-txt-'+key+'-'+proc.idx);if(t){t.innerText=val_formatNum(proc.sol);t.classList.remove('val-modified-text');}});

  val_valoresOriginalesOrdenes.delete(key);val_updateFab();
}
function val_regStateOrd(key,est,rowId){
  var g=val_dataOrig.ordenes[key];if(!g)return;
  var esAud=!rowId||rowId.includes('rowAud-');var cambios=esAud?val_cambiosAuditoria:val_cambiosVentas;
  cambios.set('ORD_S_'+key,{tipo:'ORDEN',key:key,vAntEst:g.estOrd,nuevoEstado:est,procesos:g.rows.map(function(r){return{idx:r.idx};})});

  if(rowId){var r=document.getElementById(rowId);if(r)r.classList.add('val-row-highlight');}
  val_updateFab();
}
function val_calcularSol(n,r){if(r.uni==='KG'||r.uni==='ROL')return n;var factor=r.peso;if(r.tipo&&r.tipo.includes('VARILLA'))factor*=(parseFloat((r.long.match(/[\d.]+/)||[1])[0])||1);return Math.round(n*factor*100)/100;}

function val_revivirCascada(keyPed,rowId){val_regStatePed(keyPed,'EN PROCESO',rowId);for(var k in val_dataOrig.ordenes){if(val_dataOrig.ordenes[k].keyPed===keyPed)val_regStateOrd(k,'EN PROCESO',rowId);}}
function val_terminarCascada(keyPed,rowId){val_regStatePed(keyPed,'TERMINADO',rowId);for(var k in val_dataOrig.ordenes){if(val_dataOrig.ordenes[k].keyPed===keyPed)val_regStateOrd(k,'TERMINADO',rowId);}}

function val_prepararGuardado(){
  var cambiosAct=val_tabActual===0?val_cambiosAuditoria:val_cambiosVentas;
  if(cambiosAct.size===0){sAlert('Sin cambios pendientes.');return;}
  var res='',porTipo={pedidos:[],ordenes:[],procesos:[]};
  cambiosAct.forEach(function(c){if(c.tipo==='PEDIDO')porTipo.pedidos.push(c);else if(c.tipo==='ORDEN')porTipo.ordenes.push(c);else if(c.tipo==='PROCESO')porTipo.procesos.push(c);});

      html+='<button id="undo-'+k+'" class="val-btn-undo" onclick="val_undoRowSincro(\''+k+'\',\'rowS-'+idxVer+'\')">↩</button>';
      html+='<div style="margin-top:6px;display:flex;gap:4px"><button class="val-btn-status" style="background:#4caf50;font-size:11px" onclick="val_terminarCascada(\''+k+'\',\'rowS-'+idxVer+'\')">Terminar</button><button class="val-btn-status" style="background:#757575;font-size:11px" onclick="val_cancelarCascada(\''+k+'\',\'rowS-'+idxVer+'\')">Cancelar</button></div></div>';
      html+='<div class="val-toolcn-ordenes">'+val_renderOrdenesVentas(k,idxVer)+'</div></div></td></tr>';
      idxVer++;
    }

  var cs=document.getElementById('val-contSincro');if(cs)cs.innerHTML=html+'</tbody></table>';
  hideLoader();
}

      'OK':           {bg:'FF2E7D32',fg:'FFFFFFFF'},

      'MENOS':        {bg:'FFE65100',fg:'FFFFFFFF'},

    var COLS_NUM=[7,8,9,12,13,14];

    // Recolectar todas las filas con su estado (lógica original sin cambios)
    var todasFilas=[];
    var filasResumen=[];
    document.querySelectorAll('#val-tblSincroBody > tr').forEach(function(tr){
      var type=tr.dataset.type,cells=tr.querySelectorAll('td');
      var pedExcel='',partidaExc='',codExcel='',descExcel='',solExc=0,pendExc=0,keyPed='';
      if(type==='VERIFICAR'){
        keyPed=tr.dataset.keyped||'';
        var pV=val_dataOrig.pedidos[keyPed];
        if(pV){pedExcel=pV.nombre||'';partidaExc='';codExcel=pV.cod||'';descExcel=[pV.tipo,pV.diametro?(pV.diametro+'×'+pV.longitud):'',pV.cuerpo,pV.cuerda].filter(Boolean).join(' ');}
      } else {
        var bi=cells[1]&&cells[1].querySelector('b');
        var pedInfo=bi?bi.innerText:'';
        pedExcel=pedInfo.split('[')[0].trim();
        var pm=pedInfo.match(/\[P:(\d+)\]/);partidaExc=pm?pm[1]:'1';
        var ct=cells[1]&&cells[1].querySelector('.cod-txt');codExcel=ct?ct.innerText.trim():'';
        var dt=cells[1]&&cells[1].querySelector('.val-desc-min');descExcel=dt?dt.innerText.trim():'';
        var ft=cells[1]&&cells[1].innerText||'';
        solExc=Number((ft.match(/Sol:\s*([\d,]+)/)||['','0'])[1].replace(/,/g,''))||0;
        pendExc=Number((ft.match(/Pend:\s*([\d,]+)/)||['','0'])[1].replace(/,/g,''))||0;
        keyPed=pedExcel+'_'+partidaExc;
      }
      var pSys=val_dataOrig.pedidos[keyPed];
      if(!pSys){
        var fechaHoy=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit'});
        var filaNoEnc={estado:type,row:['',type,fechaHoy,pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,'NO ENCONTRADO','','','','','','','']};
        todasFilas.push(filaNoEnc);
        filasResumen.push(filaNoEnc);
        return;
      }
      var ords=[];for(var k in val_dataOrig.ordenes){if(val_dataOrig.ordenes[k].keyPed===keyPed)ords.push(val_dataOrig.ordenes[k]);}
      if(!ords.length){
        var filaSinOrd={estado:type,row:['',type,pSys.fechaPed||'',pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,pSys.cant,'SIN ORDENES','','','','','0%','0 de '+pSys.cant]};
        todasFilas.push(filaSinOrd);
        filasResumen.push(filaSinOrd);
      } else {
        // todasFilas: detalle completo por proceso/orden (para pestañas por estado)
        ords.forEach(function(g){
          g.rows.forEach(function(proc){
            var factor=1,uni=String(proc.uni||'').toUpperCase(),tipo=String(proc.tipo||'').toUpperCase();
            if(uni.includes('PZA')||uni.includes('CTO')||uni.includes('PIEZA')){factor=Number(proc.peso)||1;if(tipo.includes('VARILLA')){var lm=String(proc.long||'').match(/[\d.]+/);factor*=lm?parseFloat(lm[0]):1;}}
            var solConv=Math.round((proc.sol||0)/(factor||1)),prodConv=Math.round((proc.prod||0)/(factor||1)),saldoConv=solConv-prodConv;
            var av=pSys.cant>0?((prodConv/pSys.cant)*100).toFixed(1)+'%':'0%';
            todasFilas.push({estado:type,row:['',type,pSys.fechaPed||'',pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,pSys.cant,g.key,proc.proc,solConv,prodConv,saldoConv,av,prodConv+' de '+pSys.cant]});
          });
        });
        // filasResumen: un renglón por pedido con órdenes unidas por coma y sumas (para hoja TODOS)
        var ordenKeys=ords.map(function(g){return g.key;}).join(', ');
        var primerProc=ords[0].rows[0]?ords[0].rows[0].proc:'';
        var factor2=1,proc0=ords[0].rows[0];
        if(proc0){var uni2=String(proc0.uni||'').toUpperCase(),tipo2=String(proc0.tipo||'').toUpperCase();if(uni2.includes('PZA')||uni2.includes('CTO')||uni2.includes('PIEZA')){factor2=Number(proc0.peso)||1;if(tipo2.includes('VARILLA')){var lm2=String(proc0.long||'').match(/[\d.]+/);factor2*=lm2?parseFloat(lm2[0]):1;}}}
        var totalSol=0,totalProd=0;
        ords.forEach(function(g){var p0=g.rows[0];if(p0){totalSol+=Math.round((Number(p0.sol)||0)/(factor2||1));totalProd+=Math.round((Number(p0.prod)||0)/(factor2||1));}});
        var totalSaldo=totalSol-totalProd;
        var av2=pSys.cant>0?((totalProd/pSys.cant)*100).toFixed(1)+'%':'0%';
        filasResumen.push({estado:type,row:['',type,pSys.fechaPed||'',pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,pSys.cant,ordenKeys,primerProc,totalSol,totalProd,totalSaldo,av2,totalProd+' de '+pSys.cant]});
      }
    });

    // Función para crear cada hoja con ExcelJS
    async function crearHoja(workbook, nombreHoja, filas, colorEncabezado){
      var ws=workbook.addWorksheet(nombreHoja,{views:[{showGridLines:false}]});
      // Definir columnas con anchos
      ws.columns=HEADERS.map(function(h,i){return {header:h,key:'c'+i,width:ANCHOS[i]};});

        cell.font={color:{argb:'FFFFFFFF'},bold:true,size:11};
        cell.alignment={horizontal:'center',vertical:'middle'};
        cell.border={
          top:{style:'thin'},bottom:{style:'thin'},
          left:{style:'thin'},right:{style:'thin'}
        };
      });
      ws.getRow(1).height=20;
      // Acumuladores para fila de totales
      var totales={};

      // Agregar filas de datos
      filas.forEach(function(f,i){
        var r=f.row.slice();
        r[0]=i+1;
        // Sumar columnas numéricas
        COLS_NUM.forEach(function(ci){
          var v=Number(r[ci])||0;
          totales[ci]+=v;
          r[ci]=v; // asegurar que sea número
        });
        var fila=ws.addRow(r);
        var colorFondo=(i%2===0)?'FFFFFFFF':'FFF5F5F5';
        fila.eachCell({includeEmpty:true},function(cell,colNum){
          var ci=colNum-1; // índice base-0
          cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:colorFondo}};
          cell.border={
            top:{style:'thin'},bottom:{style:'thin'},
            left:{style:'thin'},right:{style:'thin'}
          };
          cell.alignment={horizontal:(ci===5)?'left':'center',vertical:'middle'};
          if(COLS_NUM.indexOf(ci)>=0){cell.numFmt='#,##0';}
        });
      });
      // Fila de TOTALES
      var rowTotales=[];
      HEADERS.forEach(function(h,ci){
        if(ci===0) rowTotales.push('TOTAL');
        else if(COLS_NUM.indexOf(ci)>=0) rowTotales.push(totales[ci]);
        else rowTotales.push('');
      });
      var filaTotal=ws.addRow(rowTotales);
      filaTotal.eachCell({includeEmpty:true},function(cell,colNum){
        var ci=colNum-1;
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1565C0'}};
        cell.font={color:{argb:'FFFFFFFF'},bold:true,size:11};
        cell.alignment={horizontal:'center',vertical:'middle'};
        cell.border={
          top:{style:'thin'},bottom:{style:'thin'},
          left:{style:'thin'},right:{style:'thin'}
        };
        if(COLS_NUM.indexOf(ci)>=0){cell.numFmt='#,##0';}
      });
      filaTotal.height=20;
      // Congelar primera fila
      ws.views=[{state:'frozen',ySplit:1,showGridLines:false}];
    }

    var workbook=new ExcelJS.Workbook();
    workbook.creator='PCP Tool CN';
    workbook.created=new Date();

    // Hoja TODOS (un renglón por pedido usando filasResumen)
    await crearHoja(workbook,'TODOS',filasResumen,'FF37474F');
    // Una hoja por estado
    for(var ei=0;ei<ESTADOS.length;ei++){
      var est=ESTADOS[ei];
      var filtradas=todasFilas.filter(function(f){return f.estado===est;});
      if(!filtradas.length)continue;
      var col=COLORES[est]||{bg:'FF37474F'};
      await crearHoja(workbook,est.replace('_',' '),filtradas,col.bg);
    }

    var fecha=new Date().toLocaleDateString('es-MX').replace(/\//g,'-');
    var buffer=await workbook.xlsx.writeBuffer();
    var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='Validador_Ventas_'+fecha+'.xlsx'; a.click();
    URL.revokeObjectURL(url);
    hideLoader();
  }catch(e){hideLoader();Swal.fire('Error','Error al exportar: '+e.message,'error');}
}

function val_exportarVistaExcel(){
  showLoader('Generando Excel...');
  setTimeout(function(){
    try{
      var rows=[['FECHA_PEDIDO','ESTADO','PEDIDO','PARTIDA','CODIGO','DESCRIPCION','SOL.EXCEL','PEND.EXCEL','CANT.SYS','ORDEN','PROCESO','SOL.ORD','PROD.ORD','SALDO','AVANCE%','ENTREGADO','FECHA ENT']];
      document.querySelectorAll('#val-tblSincroBody > tr').forEach(function(tr){
        if(tr.style.display==='none')return;
        var type=tr.dataset.type,cells=tr.querySelectorAll('td');
        var pedExcel='',partidaExc='',codExcel='',descExcel='',solExc=0,pendExc=0,keyPed='';
        if(type==='VERIFICAR'){keyPed=tr.dataset.keyped||'';var pV=val_dataOrig.pedidos[keyPed];if(pV){pedExcel=pV.nombre||'';partidaExc='';codExcel=pV.cod||'';descExcel=[pV.tipo,pV.diametro?(pV.diametro+'×'+pV.longitud):'',pV.cuerpo,pV.cuerda].filter(Boolean).join(' ');}}
        else{var bi=cells[1]&&cells[1].querySelector('b');var pedInfo=bi?bi.innerText:'';pedExcel=pedInfo.split('[')[0].trim();var pm=pedInfo.match(/\[P:(\d+)\]/);partidaExc=pm?pm[1]:'1';var ct=cells[1]&&cells[1].querySelector('.cod-txt');codExcel=ct?ct.innerText.trim():'';var dt=cells[1]&&cells[1].querySelector('.val-desc-min');descExcel=dt?dt.innerText.trim():'';var ft=cells[1]&&cells[1].innerText||'';solExc=Number((ft.match(/Sol:\s*([\d,]+)/)||['','0'])[1].replace(/,/g,''))||0;pendExc=Number((ft.match(/Pend:\s*([\d,]+)/)||['','0'])[1].replace(/,/g,''))||0;keyPed=pedExcel+'_'+partidaExc;}
        var pSys=val_dataOrig.pedidos[keyPed];
        if(!pSys){rows.push(['',type,pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,'NO ENCONTRADO','','','','','','','','']);return;}
        var ords=[];for(var k in val_dataOrig.ordenes){if(val_dataOrig.ordenes[k].keyPed===keyPed)ords.push(val_dataOrig.ordenes[k]);}
        if(!ords.length){rows.push(['',type,pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,pSys.cant,'SIN ORDENES','','','','','0%','0 de '+val_formatNum(pSys.cant),'']);}
        else{ords.forEach(function(g){g.rows.forEach(function(proc){var factor=1,uni=String(proc.uni||'').toUpperCase(),tipo=String(proc.tipo||'').toUpperCase();if(uni.includes('PZA')||uni.includes('CTO')||uni.includes('PIEZA')){factor=Number(proc.peso)||1;if(tipo.includes('VARILLA')){var lm=String(proc.long||'').match(/[\d.]+/);factor*=lm?parseFloat(lm[0]):1;}}var pc=Math.round(proc.prod/(factor||1)),av=pSys.cant>0?((pc/pSys.cant)*100).toFixed(1)+'%':'0%';rows.push(['',type,pedExcel,partidaExc,codExcel,descExcel,solExc,pendExc,pSys.cant,g.key,proc.proc,proc.sol,proc.prod,proc.sol-proc.prod,av,val_formatNum(pc)+' de '+val_formatNum(pSys.cant),'']);});});}
      });
      var wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb,ws,'Sincronizacion');
      XLSX.writeFile(wb,'Reporte_Validador_'+new Date().toLocaleDateString().replace(/\//g,'-')+'.xlsx');
      hideLoader();
    }catch(e){hideLoader();sAlert('Error al exportar: '+e.message);}
  },300);
}

// Modal Transferencia Validador
function val_abrirModalTransferencia(ordKey){
  var g=val_dataOrig.ordenes[ordKey];if(!g)return;
  document.getElementById('val-tituloModalTrans').textContent='🔄 PRODUCCIÓN — ORDEN '+ordKey;
  document.getElementById('val-cuerpoModalTrans').innerHTML='<p style="text-align:center;padding:24px;color:#999">Cargando registros...</p>';
  document.getElementById('val-modalTransferencia').style.display='block';
  var ids=g.rows.map(function(r){return r.idOrden;});
  google.script.run
    .withSuccessHandler(function(result){var data=JSON.parse(result);if(!data.success){document.getElementById('val-cuerpoModalTrans').innerHTML='<p style="color:red;padding:16px">Error: '+(data.error||data.msg)+'</p>';return;}val_renderProduccionModal(data,ordKey);})
    .withFailureHandler(function(err){document.getElementById('val-cuerpoModalTrans').innerHTML='<p style="color:red;padding:16px">Error: '+err.message+'</p>';})
    .obtenerProduccionDeOrden(JSON.stringify(ids));

function val_cerrarModalTransferencia(){document.getElementById('val-modalTransferencia').style.display='none';}
function val_toggleSeccionTrans(secId){var el=document.getElementById(secId);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function val_editarCampoProd(id,fila,campo,valor){google.script.run.withSuccessHandler(function(res){var r=JSON.parse(res);if(!r.success)sAlert('Error: '+r.msg);}).withFailureHandler(function(err){sAlert('Error: '+err.message);}).guardarEdicionProduccion({id:id,fila:fila,campo:campo,valor:valor});}

function val_renderProduccionModal(data,ordKey){
  var registros=data.registros||[],lotesDisp=data.lotes||[],maqsProc=data.maquinasDelProceso||{};
  val_transCtx.nombreOrden=data.nombreOrden||ordKey;val_transCtx.descripcionOrden=data.descripcionOrden||'';
  if(!registros.length){document.getElementById('val-cuerpoModalTrans').innerHTML='<p style="color:#999;padding:16px;text-align:center">Sin registros de producción.</p>';return;}
  var porProceso={};registros.forEach(function(r){if(!porProceso[r.proceso])porProceso[r.proceso]=[];porProceso[r.proceso].push(r);});
  var lotesOpts=lotesDisp.map(function(l){return '<option value="'+l+'">'+l+'</option>';}).join('');
  var html='';
  Object.keys(porProceso).forEach(function(proc){
    var regs=porProceso[proc],total=regs.reduce(function(s,r){return s+r.producido;},0);
    var secId='sec-proc-'+proc.replace(/[^a-zA-Z0-9]/g,'_'),maqsP=maqsProc[proc]||[];
    html+='<div style="margin-bottom:14px;border:2px solid #2e7d32;border-radius:6px">';
    html+='<div style="background:#2e7d32;color:white;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-radius:4px 4px 0 0" onclick="val_toggleSeccionTrans(\''+secId+'\')"><b>'+proc+'</b><span>Total: <b>'+val_formatNum(total)+' kg</b> ('+regs.length+' reg.) ▼</span></div>';
    html+='<div id="'+secId+'"><div style="overflow-x:auto"><table style="font-size:11px;margin:0;border:none;width:100%"><thead><tr style="background:#f5f5f5"><th style="padding:4px;border:1px solid #ccc">#</th><th style="padding:4px;border:1px solid #ccc">Fecha</th><th style="padding:4px;border:1px solid #ccc">Turno</th><th style="padding:4px;border:1px solid #ccc">Lote</th><th style="padding:4px;border:1px solid #ccc">Máquina</th><th style="padding:4px;border:1px solid #ccc">Peso I</th><th style="padding:4px;border:1px solid #ccc">Peso F</th><th style="padding:4px;border:1px solid #ccc">Tina</th><th style="padding:4px;border:1px solid #ccc">Producido</th><th style="padding:4px;border:1px solid #ccc">Trans.</th></tr></thead><tbody>';
    regs.forEach(function(r,rowIdx){
      var rid=r.id.replace(/[^a-zA-Z0-9]/g,'_');
      var maqList=maqsP.length>0?maqsP.slice():[r.maquina];if(maqsP.length>0&&maqsP.indexOf(r.maquina)<0)maqList.unshift(r.maquina);
      var maqOpts=maqList.map(function(m){return '<option value="'+m+'"'+(m===r.maquina?' selected':'')+'>'+m+'</option>';}).join('');
      var procEsc=r.proceso.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+='<tr id="treg-'+rid+'"><td style="border:1px solid #ddd;padding:2px;text-align:center;color:#888">'+(rowIdx+1)+'</td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><input type="date" value="'+r.fecha+'" style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'fecha\',this.value)"></td>';
      html+='<td style="border:1px solid #ddd;padding:1px;text-align:center"><select style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'turno\',this.value)"><option value="1"'+(r.turno==='1'?' selected':'')+'>1</option><option value="2"'+(r.turno==='2'?' selected':'')+'>2</option><option value="3"'+(r.turno==='3'?' selected':'')+'>3</option></select></td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><select style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'lote\',this.value)"><option value="'+r.lote+'">'+r.lote+'</option>'+lotesOpts+'</select></td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><select style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'maquina\',this.value)">'+maqOpts+'</select></td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><input type="number" value="'+r.pesoI+'" style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'pesoI\',this.value)"></td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><input type="number" value="'+r.pesoF+'" style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'pesoF\',this.value)"></td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><input type="number" value="'+r.pesoTina+'" style="border:none;font-size:11px;width:100%" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'pesoTina\',this.value)"></td>';
      html+='<td style="border:1px solid #ddd;padding:1px"><input type="number" value="'+r.producido+'" style="border:1px solid #ff9800;font-size:11px;width:100%;background:#fff9c4" onchange="val_editarCampoProd(\''+r.id+'\','+r.fila+',\'producido\',this.value)"></td>';
      html+='<td style="border:1px solid #ddd;padding:1px;text-align:center"><button onclick="val_abrirMiniTrans(\''+r.id+'\','+r.fila+','+r.producido+',\''+procEsc+'\')" style="background:#1565c0;color:white;border:none;border-radius:3px;padding:2px 5px;cursor:pointer;font-size:10px">🔄</button></td></tr>';
    });
    html+='</tbody></table></div><div style="text-align:right;padding:5px 12px;font-size:12px;font-weight:bold;color:#2e7d32">TOTAL '+proc+': '+val_formatNum(total)+' kg</div></div></div>';
  });
  document.getElementById('val-cuerpoModalTrans').innerHTML=html;
}

function val_abrirMiniTrans(idRegistro,filaRegistro,producido,procesoActual){
  val_transCtx.idRegistro=idRegistro;val_transCtx.filaRegistro=filaRegistro;val_transCtx.producidoReg=producido;val_transCtx.procesoActual=procesoActual;val_transCtx.modo='CREAR_DOS';val_transCtx.candidatas=[];
  document.getElementById('val-miniTransTitulo').textContent='🔄 Transferir Registro';
  document.getElementById('val-miniTransCuerpo').innerHTML='<p style="text-align:center;color:#999;padding:16px">Buscando órdenes candidatas...</p>';
  document.getElementById('val-modalMiniTrans').style.display='flex';
  google.script.run
    .withSuccessHandler(function(res){var data=JSON.parse(res);if(!data.success){document.getElementById('val-miniTransCuerpo').innerHTML='<p style="color:red">Error: '+data.msg+'</p>';return;}val_transCtx.candidatas=data.candidatas||[];val_renderMiniTrans();})
    .withFailureHandler(function(err){document.getElementById('val-miniTransCuerpo').innerHTML='<p style="color:red">Error: '+err.message+'</p>';})
    .transferirProduccion({modo:'CONSULTAR',idRegistro:idRegistro,filaRegistro:filaRegistro});
}
function val_renderMiniTrans(){
  var cands=val_transCtx.candidatas,prodMax=Number(val_transCtx.producidoReg)||0;
  var html='<div style="background:#e3f2fd;border-left:4px solid #1565c0;padding:9px;margin-bottom:12px;border-radius:4px">'
    +'<b>📦 Transfiriendo:</b><br><span style="font-weight:900">ORDEN: '+(val_transCtx.nombreOrden||'')+'</span><br><span style="color:#555">'+(val_transCtx.descripcionOrden||'')+'</span><br>'
    +'<span style="margin-top:5px;display:block">Producción: <b>'+val_formatNum(prodMax)+' KG</b></span>'
    +'<span style="color:#c62828;font-size:11px">⚠ No puede superar '+val_formatNum(prodMax)+' KG</span></div>';
  html+='<div style="margin-bottom:10px"><label style="font-weight:bold">Modo:</label><br>'
    +'<label style="display:flex;align-items:center;gap:5px;margin-top:5px;cursor:pointer"><input type="radio" name="val-modoTrans" value="CREAR_DOS" checked onchange="val_transCtx.modo=this.value;document.getElementById(\'val-cantTransDiv\').style.display=\'block\'"> <b>CREAR DOS registros</b></label>'
    +'<label style="display:flex;align-items:center;gap:5px;margin-top:5px;cursor:pointer"><input type="radio" name="val-modoTrans" value="MODIFICAR" onchange="val_transCtx.modo=this.value;document.getElementById(\'val-cantTransDiv\').style.display=\'none\'"> <b>MODIFICAR orden</b></label>'
    +'</div>';
  html+='<div id="val-cantTransDiv" style="margin-bottom:10px"><label style="font-weight:bold">Cantidad a transferir (kg):</label><br>'
    +'<input type="number" id="val-inpCantTrans" min="1" max="'+(prodMax-0.001)+'" style="border:2px solid #1565c0;padding:5px;font-size:14px;width:140px;border-radius:4px;margin-top:3px" oninput="val_validarCantTrans(this,'+prodMax+')">'
    +'<span id="val-errCantTrans" style="display:none;color:#c62828;font-size:11px;margin-left:6px;font-weight:bold">Excede el máximo</span></div>';
  html+='<div style="margin-bottom:10px"><label style="font-weight:bold">Orden destino:</label>';
  if(!cands.length){html+='<p style="color:#e65100;margin:6px 0;padding:8px;background:#fff3e0;border-radius:4px;font-size:12px">⚠ No hay órdenes candidatas.</p>';}
  else{html+='<div style="max-height:180px;overflow-y:auto;border:2px solid #ddd;border-radius:4px;margin-top:5px">';cands.forEach(function(c){var pct=c.sol>0?Math.round(c.prod/c.sol*100):0;html+='<label style="display:flex;align-items:center;padding:7px;cursor:pointer;border-bottom:1px solid #eee;gap:6px"><input type="radio" name="val-ordDest" value="'+c.id+'"><span><b>'+c.nombre+'</b> Sol:'+val_formatNum(c.sol)+' Prod:'+val_formatNum(c.prod)+' <b style="color:#1565c0">('+pct+'%)</b></span></label>';});html+='</div>';}
  html+='</div>';
  document.getElementById('val-miniTransCuerpo').innerHTML=html;
  var btn=document.getElementById('val-btnEjecutarTrans');if(btn)btn.disabled=!cands.length;
}
function val_validarCantTrans(el,max){var v=Number(el.value),excede=v<=0||v>=max;el.style.borderColor=excede?'#c62828':'#1565c0';var err=document.getElementById('val-errCantTrans');if(err)err.style.display=excede?'inline':'none';var btn=document.getElementById('val-btnEjecutarTrans');if(btn)btn.disabled=excede||!val_transCtx.candidatas.length;}
function val_ejecutarTransferencia(){
  var ordDestEl=document.querySelector('input[name="val-ordDest"]:checked');if(!ordDestEl){sAlert('Selecciona una orden destino.');return;}
  var modo=val_transCtx.modo,payload={modo:modo,idRegistro:val_transCtx.idRegistro,filaRegistro:val_transCtx.filaRegistro,idOrdenDestino:ordDestEl.value};
  if(modo==='CREAR_DOS'){var cant=Number(document.getElementById('val-inpCantTrans').value);if(!cant||cant<=0){sAlert('Ingresa una cantidad válida.');return;}payload.cantTransferir=cant;}
  // confirm handled by Swal below - replaced inline
  var btn=document.getElementById('val-btnEjecutarTrans');btn.disabled=true;btn.textContent='Procesando...';
  google.script.run
    .withSuccessHandler(function(res){btn.disabled=false;btn.textContent='Ejecutar';var data=JSON.parse(res);if(!data.success){sAlert('Error: '+data.msg);return;}sAlert('✅ Transferencia completada.');document.getElementById('val-modalMiniTrans').style.display='none';val_cerrarModalTransferencia();})
    .withFailureHandler(function(err){btn.disabled=false;btn.textContent='Ejecutar';sAlert('Error: '+err.message);})
    .transferirProduccion(payload);
}
